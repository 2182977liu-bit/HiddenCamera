name: Build APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Verify source code
      run: |
        echo "=== RecordingService.kt line 72 ==="
        sed -n '72p' app/src/main/java/com/example/hiddencamera/RecordingService.kt
        echo "=== RecordingService.kt line 215 ==="
        sed -n '215p' app/src/main/java/com/example/hiddencamera/RecordingService.kt

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Install Gradle 8.2
      run: |
        wget -q https://services.gradle.org/distributions/gradle-8.2-bin.zip
        unzip -q gradle-8.2-bin.zip
        export PATH=$PWD/gradle-8.2/bin:$PATH
        gradle wrapper --gradle-version 8.2

    - name: Build Debug APK
      run: ./gradlew clean assembleDebug --no-build-cache --no-daemon 2>&1 | tee build.log

    - name: Upload APK
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: app-debug
        path: app/build/outputs/apk/debug/*.apk

    - name: Upload Build Log
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: build.log
